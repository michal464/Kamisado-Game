<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../images/icon.webp">
    <title>Register for the Game</title>
    <link rel="stylesheet" href="../css/home-page.css">
</head>

<body>
    <button type="button" id="next-button" class="hide"><a href="../html/games.html">Choose a geme</a></button>
    <div class="form-container" id="form-container">
        <h2>Register or Login</h2>
        <form id="registration-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="Enter 10-digit phone number" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <button type="button" onclick="initializeUserDataAndStore(event)">Register</button>
                <button type="button" id="login-button" onclick="showLogin()">Already Registered? Login</button>
            </div>
        </form>

        <div id="login-form" class="hide">
            <h2>Login</h2>
            <div id="message" class="error"></div>
            <form id="login-form-element">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <div class="form-group">
                    <button type="button" onclick="loginUser(event)">Login</button>
                    <button type="button" id="register-button" onclick="showRegistr()">New user? Register</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/home-page.js"></script>
</body>

</html>
