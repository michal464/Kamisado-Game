<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/games.css">
    <link rel="icon" type="image/x-icon" href="../images/icon.webp">
    <title> games</title>
</head>

<body>

    <nav class="navbar">
        <div class="player-info">
            <div class="player">
                <img src="../images/black.webp" alt="Player 1 Icon" class="player-icon">
                <span id="player1-name">First Player</span>
            </div>
            <div class="player">
                <img src="../images/white.webp" alt="Player 2 Icon" class="player-icon">
                <span id="player2-name">Second Player</span>
            </div>
        </div>
        <button class="logout-btn" id="logout-btn">Sign Out</button>
    </nav>

    <div class="starfield"></div>
    <div class="welcome-message">
        <h1>Select a game in order to start</h1>
    </div>

    <div class="game-container">
        <div class="game">
            <img src="../images/joker.webp" alt="Mario">
            <button class="start-btn"><a href="../html/notAvailable.html">Start Playing</a></button>
        </div>
        <div class="game">
            <img src="../images/kamisadoImage.jpg" alt="Mario">
            <button class="start-btn"><a href="../html/instruction.html">Start Playing</a></button>
        </div>
        <div class="game">
            <img src="../images/ace.webp" alt="Mario">
            <button class="start-btn"><a href="../html/notAvailable.html">Start Playing</a></button>
        </div>
    </div>
    <script src="../js/games.js"></script>
</body>

</html>
